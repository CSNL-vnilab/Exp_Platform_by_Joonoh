name: Prod smoke (cron auth)

# Cheap defensive check — hits every /api/cron/* endpoint on prod
# WITHOUT a secret and expects 401. Catches silent auth regressions
# (e.g. a deploy swap that drops a route or removes the auth gate)
# within one schedule window.
#
# Does not send CRON_SECRET, so no side effects — all runs are
# read-only probes.

on:
  schedule:
    # Every 6 hours at :05 (offset from the :00/:30 cron-fire windows
    # to avoid overlapping with the actual sweeps).
    - cron: "5 */6 * * *"
  workflow_dispatch:

jobs:
  probe-cron-auth:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Probe all cron endpoints — expect 401
        env:
          NEXT_PUBLIC_APP_URL: https://lab-reservation-seven.vercel.app
        run: node scripts/smoke-cron-auth.mjs
