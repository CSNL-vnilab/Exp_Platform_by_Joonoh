name: Reminders cron
on:
  schedule:
    # Every 15 minutes (UTC).
    - cron: "*/15 * * * *"
  workflow_dispatch:

jobs:
  ping-reminders:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reminders endpoint
        env:
          REMINDER_URL: https://lab-reservation-seven.vercel.app/api/notifications/reminders
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET repo secret is missing — add it at Settings → Secrets → Actions"
            exit 1
          fi
          # Print length only (never the secret itself). Expected 64 for hex32.
          echo "secret_length=${#CRON_SECRET}"
          status=$(curl -sS -o /tmp/resp -w "%{http_code}" \
            -X POST "$REMINDER_URL" \
            -H "x-cron-secret: $CRON_SECRET")
          echo "HTTP $status"
          echo "--- response body ---"
          cat /tmp/resp || true
          echo
          echo "--- /end ---"
          if [ "$status" != "200" ]; then
            echo "::error::reminders endpoint returned HTTP $status"
            exit 1
          fi
